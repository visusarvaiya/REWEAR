<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REWEAR - Signup</title>

    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container">

    <h1>REWEAR</h1>
    <p>Create Your Account</p>

    <form id="signupForm">

        <input
            type="text"
            id="name"
            placeholder="Full Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Sign Up
        </button>

    </form>

    <p>
        Already have an account?
        <a href="login.html">Login</a>
    </p>

</div>

<script src="js/signup.js"></script>

</body>
</html>

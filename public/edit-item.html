<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Item | REWEAR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="/">REWEAR</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="/">Home</a>
            <a class="nav-link text-white" href="browse.html">Browse</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <form id="editForm">

                <h2 class="text-center mb-4">Edit Item</h2>

                <input type="text" id="name" class="form-control" placeholder="Item Name" required>

                <input type="text" id="category" class="form-control" placeholder="Category" required>

                <input type="text" id="size" class="form-control" placeholder="Size" required>

                <input type="text" id="condition" class="form-control" placeholder="Condition" required>

                <textarea id="description" class="form-control" rows="4" placeholder="Description" required></textarea>

                <input type="url" id="image" class="form-control" placeholder="Image URL" required>

                <input type="text" id="owner" class="form-control" placeholder="Owner Name" required>

                <button class="btn btn-success w-100 mt-3">
                    Update Item
                </button>

            </form>

        </div>

    </div>

</div>

<script src="js/editItem.js"></script>

</body>
</html>
